<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLPA Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mozilla: {
              50:  '#fff4ed',
              100: '#ffe8d5',
              200: '#ffcfaa',
              300: '#ffae75',
              400: '#ff813d',
              500: '#ff5c17',
              600: '#f03d05',
              700: '#c72c06',
              800: '#9e250d',
              900: '#7f210e',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spinner {
      border: 2px solid #e5e7eb;
      border-top-color: #ff5c17;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bar-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
      <svg class="w-7 h-7 text-mozilla-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
      </svg>
      <div>
        <h1 class="text-lg font-semibold text-gray-900 leading-tight">MLPA Admin Dashboard</h1>
        <p class="text-xs text-gray-500">Mozilla LLM Proxy Auth · User Management</p>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

    <!-- Auth Card -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-4">Authentication</h2>
      <div class="flex gap-3 items-end">
        <div class="flex-1">
          <label for="masterKeyInput" class="block text-sm font-medium text-gray-700 mb-1.5">
            UI Access Key
          </label>
          <input
            id="masterKeyInput"
            type="password"
            placeholder="Paste your UI access key here…"
            class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-mozilla-500 focus:border-transparent transition"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button
          id="loadBtn"
          onclick="loadDashboard()"
          class="flex items-center gap-2 bg-mozilla-500 hover:bg-mozilla-600 active:bg-mozilla-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition whitespace-nowrap"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          Load Data
        </button>
      </div>
      <p id="authError" class="hidden mt-3 text-sm text-red-600 flex items-center gap-1.5">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
        <span id="authErrorText"></span>
      </p>
    </div>

    <!-- User Stats Card -->
    <div id="statsCard" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm p-6 fade-in">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">User Statistics</h2>
        <div id="lastUpdated" class="text-xs text-gray-400"></div>
      </div>

      <!-- Total users -->
      <div class="flex items-center gap-4 p-4 rounded-xl bg-mozilla-50 border border-mozilla-100 mb-6">
        <div class="w-12 h-12 rounded-xl bg-mozilla-500 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
        </div>
        <div>
          <p class="text-sm text-mozilla-700 font-medium">Total Users</p>
          <p id="totalUsers" class="text-3xl font-bold text-mozilla-600 leading-tight">—</p>
        </div>
      </div>

      <!-- By service type -->
      <div>
        <h3 class="text-sm font-medium text-gray-600 mb-3">Breakdown by Service Type</h3>
        <div id="serviceTypeList" class="space-y-3"></div>
      </div>
    </div>

    <!-- Loading state -->
    <div id="loadingCard" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm p-8 flex items-center justify-center gap-3 text-gray-500 text-sm">
      <span class="spinner"></span>
      <span>Fetching user data…</span>
    </div>

  </main>

  <script>
    const SERVICE_TYPE_META = {
      'ai':           { label: 'AI',                          color: 'bg-blue-500' },
      's2s':          { label: 'Shake-to-Summarize',          color: 'bg-emerald-500' },
      's2s-android':  { label: 'Shake-to-Summarize (Android)', color: 'bg-teal-500' },
      'memories':     { label: 'Memories',                    color: 'bg-purple-500' },
      'ai-dev':       { label: 'AI (Dev)',                    color: 'bg-blue-300' },
      'memories-dev': { label: 'Memories (Dev)',              color: 'bg-purple-300' },
      'mochi-dev':    { label: 'Mochi (Dev)',                 color: 'bg-pink-400' },
    };

    function showError(msg) {
      const el = document.getElementById('authError');
      document.getElementById('authErrorText').textContent = msg;
      el.classList.remove('hidden');
      el.classList.add('flex');
    }

    function clearError() {
      const el = document.getElementById('authError');
      el.classList.add('hidden');
      el.classList.remove('flex');
    }

    async function loadDashboard() {
      clearError();
      const key = document.getElementById('masterKeyInput').value.trim();
      if (!key) {
        showError('Please enter a master key.');
        return;
      }

      document.getElementById('statsCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('hidden');

      try {
        const res = await fetch('/user/counts-by-service-type', {
          headers: { 'mlpa_ui_access_key': `Bearer ${key}` },
        });

        if (res.status === 401) {
          showError('Invalid UI access key — request was rejected (401 Unauthorized).');
          return;
        }
        if (!res.ok) {
          showError(`Request failed: ${res.status} ${res.statusText}`);
          return;
        }

        renderStats(await res.json());
      } catch (err) {
        showError(`Network error: ${err.message}`);
      } finally {
        document.getElementById('loadingCard').classList.add('hidden');
      }
    }

    function renderStats(data) {
      const { service_type_counts, total_users } = data;

      document.getElementById('totalUsers').textContent = total_users.toLocaleString();

      const list = document.getElementById('serviceTypeList');
      list.innerHTML = '';

      const entries = Object.entries(service_type_counts).sort((a, b) => b[1] - a[1]);
      const max = entries[0]?.[1] ?? 1;

      entries.forEach(([type, count]) => {
        const meta = SERVICE_TYPE_META[type] ?? { label: type, color: 'bg-gray-400' };
        const pct = Math.round((count / max) * 100);
        const sharePct = total_users > 0 ? ((count / total_users) * 100).toFixed(1) : '0.0';

        const row = document.createElement('div');
        row.className = 'flex items-center gap-3';
        row.innerHTML = `
          <div class="w-40 shrink-0">
            <span class="inline-flex items-center gap-1.5 text-sm font-medium text-gray-700">
              <span class="w-2 h-2 rounded-full ${meta.color} shrink-0"></span>
              ${meta.label}
            </span>
          </div>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
            <div class="bar-fill ${meta.color} h-2 rounded-full" style="width: ${pct}%"></div>
          </div>
          <div class="w-24 text-right shrink-0">
            <span class="text-sm font-semibold text-gray-800">${count.toLocaleString()}</span>
            <span class="text-xs text-gray-400 ml-1">${sharePct}%</span>
          </div>
        `;
        list.appendChild(row);
      });

      if (entries.length === 0) {
        list.innerHTML = '<p class="text-sm text-gray-400 italic">No users found.</p>';
      }

      document.getElementById('lastUpdated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
      const statsCard = document.getElementById('statsCard');
      statsCard.classList.remove('hidden');
      statsCard.classList.add('fade-in');
    }

    document.getElementById('masterKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadDashboard();
    });
  </script>
</body>
</html>
