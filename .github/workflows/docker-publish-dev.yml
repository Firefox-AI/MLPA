name: Build and Push Dev Docker Image to Google Artifact Registry

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number associated with this dev build"
        required: true
        type: string

jobs:
  # docs - https://github.com/mozilla/deploy-actions/blob/main/.github/workflows/docs/build-and-push.md
  build-and-push-dev:
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    uses: mozilla/deploy-actions/.github/workflows/build-and-push.yml@main
    with:
      image_name: mlpa
      gar_name: llm-proxy-prod
      project_id: moz-fx-llm-proxy-prod-b0b8
      should_tag_latest: false
